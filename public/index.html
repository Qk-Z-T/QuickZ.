<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>QuickZ | Education Platform</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="QuickZ">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" type="image/png" href="icons/icon-192.png">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SolaimanLipi Font -->
    <link rel="stylesheet" href="https://fonts.maateen.me/solaiman-lipi/font.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.maateen.me/solaiman-lipi/font.css"></noscript>
    
    <!-- Outfit Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- SweetAlert2 & Moment.js -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    
    <!-- MathJax -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                packages: ['base', 'ams', 'noerrors', 'noundefined']
            },
            svg: { fontCache: 'global' },
            options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
        };
    </script>
    
    <!-- Shared Styles -->
    <link rel="stylesheet" href="../src/shared/styles/base.css">
    <link rel="stylesheet" href="../src/shared/styles/teacher.css">
    <link rel="stylesheet" href="../src/shared/styles/student.css">
</head>
<body class="text-slate-800 bg-slate-50">

    <!-- Splash Screen -->
    <div id="splash-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white">
        <div class="text-4xl font-bold" style="font-family:'Outfit',sans-serif;">
            <span>Quick</span><span class="text-emerald-500">Z</span>
        </div>
        <div class="text-sm text-slate-500 mt-2">The ultimate exam platform</div>
        <div class="mt-6">
            <div class="loader" style="width:32px;height:32px;border-width:3px;"></div>
        </div>
    </div>

    <!-- Auth Screen (Student + Teacher) -->
    <div id="auth-screen" class="fixed inset-0 z-40 hidden flex flex-col items-center justify-center p-6" 
         style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);">
        
        <div class="w-full max-w-md">
            <!-- Role Switcher -->
            <div class="flex justify-center mb-6">
                <div class="flex bg-white/10 rounded-xl p-1">
                    <button id="role-student-btn" class="px-6 py-2 rounded-lg font-bold text-sm text-white bg-indigo-600 transition"
                            onclick="switchAuthRole('student')">Student</button>
                    <button id="role-teacher-btn" class="px-6 py-2 rounded-lg font-bold text-sm text-white/60 transition"
                            onclick="switchAuthRole('teacher')">Teacher</button>
                </div>
            </div>

            <!-- Student Login Form -->
            <div id="student-auth-form" class="bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-8">
                <h2 class="text-white text-xl font-bold mb-4 text-center">Student Login</h2>
                <input type="email" id="s-email" class="w-full p-3 bg-white/10 border border-white/20 rounded-xl mb-3 text-white placeholder-white/40" placeholder="Email">
                <div class="relative mb-4">
                    <input type="password" id="s-pass" class="w-full p-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40" placeholder="Password">
                    <i class="fas fa-eye absolute right-4 top-1/2 -translate-y-1/2 text-white/40 cursor-pointer" onclick="togglePassword('s-pass', this)"></i>
                </div>
                <button id="student-login-btn" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold mb-2" onclick="AuthService.loginStudent(
                    document.getElementById('s-email').value,
                    document.getElementById('s-pass').value
                ).catch(e => Swal.fire('Error', e.message, 'error'))">
                    Login as Student
                </button>
                <p class="text-white/50 text-sm text-center mt-2">No account? <span class="text-indigo-400 cursor-pointer font-bold" onclick="signupStudent()">Sign Up</span></p>
            </div>

            <!-- Teacher Login Form -->
            <div id="teacher-auth-form" class="bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl p-8 hidden">
                <h2 class="text-white text-xl font-bold mb-4 text-center">Teacher Login</h2>
                <input type="email" id="t-email" class="w-full p-3 bg-white/10 border border-white/20 rounded-xl mb-3 text-white placeholder-white/40" placeholder="Email">
                <div class="relative mb-4">
                    <input type="password" id="t-pass" class="w-full p-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40" placeholder="Password">
                    <i class="fas fa-eye absolute right-4 top-1/2 -translate-y-1/2 text-white/40 cursor-pointer" onclick="togglePassword('t-pass', this)"></i>
                </div>
                <button id="teacher-login-btn" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold" onclick="AuthService.loginTeacher(
                    document.getElementById('t-email').value,
                    document.getElementById('t-pass').value
                ).catch(e => Swal.fire('Error', e.message, 'error'))">
                    Login as Teacher
                </button>
            </div>
        </div>
    </div>

    <!-- App Container (Dynamic) -->
    <div id="app-container" class="hidden min-h-screen w-full"></div>

    <!-- Math Symbols Panel -->
    <div id="math-symbols-panel" class="math-symbols-panel hidden">
        <button class="math-panel-close" onclick="document.getElementById('math-symbols-panel').classList.add('hidden')">×</button>
        <div class="symbol-group">
            <div class="symbol-group-title">Basic</div>
            <div class="symbol-buttons">
                <button class="symbol-btn" onclick="insertSymbol('+')">+</button>
                <button class="symbol-btn" onclick="insertSymbol('\\times')">×</button>
                <button class="symbol-btn" onclick="insertSymbol('\\div')">÷</button>
                <button class="symbol-btn" onclick="insertSymbol('\\sqrt{}')">√</button>
                <button class="symbol-btn" onclick="insertSymbol('^{}')">x²</button>
                <button class="symbol-btn" onclick="insertSymbol('\\frac{}{}')">½</button>
            </div>
        </div>
    </div>

    <!-- Floating Math Button -->
    <button id="floating-math-btn" class="floating-math-btn hidden" onclick="document.getElementById('math-symbols-panel').classList.toggle('hidden')">
        <i class="fas fa-square-root-alt"></i>
    </button>

    <!-- App Scripts -->
    <script type="module" src="../src/app/main.js"></script>

    <script>
        // Role switcher
        function switchAuthRole(role) {
            const studentBtn = document.getElementById('role-student-btn');
            const teacherBtn = document.getElementById('role-teacher-btn');
            const studentForm = document.getElementById('student-auth-form');
            const teacherForm = document.getElementById('teacher-auth-form');
            if (role === 'student') {
                studentBtn.className = 'px-6 py-2 rounded-lg font-bold text-sm text-white bg-indigo-600 transition';
                teacherBtn.className = 'px-6 py-2 rounded-lg font-bold text-sm text-white/60 transition';
                studentForm.classList.remove('hidden');
                teacherForm.classList.add('hidden');
            } else {
                teacherBtn.className = 'px-6 py-2 rounded-lg font-bold text-sm text-white bg-emerald-600 transition';
                studentBtn.className = 'px-6 py-2 rounded-lg font-bold text-sm text-white/60 transition';
                teacherForm.classList.remove('hidden');
                studentForm.classList.add('hidden');
            }
        }

        function togglePassword(id, el) {
            const inp = document.getElementById(id);
            if (inp.type === 'password') { inp.type = 'text'; el.classList.replace('fa-eye', 'fa-eye-slash'); }
            else { inp.type = 'password'; el.classList.replace('fa-eye-slash', 'fa-eye'); }
        }

        async function signupStudent() {
            const { value: email } = await Swal.fire({ title: 'Sign Up', input: 'email', inputLabel: 'Email', showCancelButton: true });
            if (!email) return;
            const { value: password } = await Swal.fire({ title: 'Password', input: 'password', inputLabel: 'Password', showCancelButton: true });
            if (!password) return;
            try {
                await AuthService.signupStudent(email, password);
            } catch(e) {
                Swal.fire('Error', e.message, 'error');
            }
        }
    </script>

</body>
</html>
